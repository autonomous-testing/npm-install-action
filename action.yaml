name: Npm Install
description: Install nodejs, run npm ci and cache it.

inputs:
  nodejs-version:
    description: "Nodejs version."
    required: false
    default: "24.18.0"

  npm-token:
    description: "Auth token exported as NPM_TOKEN during npm ci (for private registries referenced from .npmrc)."
    required: false
    default: ""

runs:
  using: "composite"

  steps: 
    - name: Cache
      id: cache
      uses: actions/cache@v6
      with:
        path: node_modules
        key: nodejs-${{inputs.nodejs-version}}-${{hashFiles('package-lock.json')}}
        restore-keys: nodejs-${{inputs.nodejs-version}}-

    - name: Setup nodejs
      uses: actions/setup-node@v6
      with:
        node-version: ${{inputs.nodejs-version}}

    - name: Setup node_modules
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        NPM_TOKEN: ${{inputs.npm-token}}
      run: npm ci
